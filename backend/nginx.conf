user www-data;
worker_processes auto;
pid /run/nginx.pid;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    client_max_body_size 20M;
    server_names_hash_bucket_size 128;

    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;


    #############################################################
    # 1) TELEGRAM.WEBAPP — backend (Node + FastAPI + боты)
    #############################################################
    server {
        listen 443 ssl;
        server_name telegram.pokerhub.pro;

        ssl_certificate     /etc/letsencrypt/live/pokerhub.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pokerhub.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        ### React WebApp (порт 3000)
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### Admin bot panel (порт 5000)
        location ~ ^/adminbot(.*)$ {
            proxy_pass http://127.0.0.1:5000$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### Data Science backend (порт 5200)
        location /ds/ {
            rewrite ^/ds/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:5200;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### FastAPI бот-API (порт 3095)
        location /api/ {
            proxy_pass http://127.0.0.1:3095;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### Stats Service (порт 8090)
        location = /stats {
            return 301 /stats/;
        }

        location /stats/ {
            proxy_pass http://127.0.0.1:8090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### RAG Flow
        location /ragflow/ {
            proxy_pass http://127.0.0.1:9080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### Jivo integration
        location /jivo/ {
            proxy_pass http://127.0.0.1:9200/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ### RAG static
        location /rag/ {
            proxy_pass http://127.0.0.1:9080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            sub_filter 'href="/' 'href="/rag/';
            sub_filter 'src="/'  'src="/rag/';
            sub_filter_once off;
        }
    }


    #############################################################
    # 2) WEBPANEL — админка (порт 5000)
    #############################################################
    server {
        listen 443 ssl;
        server_name webpanel.pokerhub.pro;

        ssl_certificate     /etc/letsencrypt/live/pokerhub.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pokerhub.app/privkey.pem;

        location / {
            proxy_pass http://127.0.0.1:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }


    #############################################################
    # 3) LEVEL-IQ.RU — React DIST + PHP API
    #############################################################
    server {
        listen 443 ssl;
        server_name level-iq.ru;

        ssl_certificate     /etc/letsencrypt/live/level-iq.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/level-iq.ru/privkey.pem;

        root /home/fervuld/prod/pokerhub.app/mind-hub-intellect-quest-main/dist;
        index index.html;

        ### PHP API - ИСПРАВЛЕНО
        location /api/ {
            # Убираем alias, используем root
            root /home/fervuld/prod/pokerhub.app/public_html;
            
            # Обрабатываем OPTIONS для CORS
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            
            # Пытаемся найти файл, иначе направляем на index.php
            try_files $uri $uri/ /api/index.php?$query_string;
        }

        ### PHP обработка для API
        location ~ ^/api/.*\.php$ {
            root /home/fervuld/prod/pokerhub.app/public_html;

            include fastcgi_params;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # CORS headers для PHP
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
        }

        ### SPA fallback для React
        location / {
            try_files $uri $uri/ /index.html;
        }
    }


    #############################################################
    # 3.5) TEST.LEVEL-IQ.RU — Тестовое окружение
    #############################################################
    server {
        listen 443 ssl;
        server_name test.level-iq.ru;

        ssl_certificate     /etc/letsencrypt/live/level-iq.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/level-iq.ru/privkey.pem;

        root /home/fervuld/prod/pokerhub.app-test/mind-hub-intellect-quest-main/dist;
        index index.html;

        ### PHP API
        location ~ ^/api/.*\.php$ {
            root /home/fervuld/prod/pokerhub.app-test/public_html;

            include fastcgi_params;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
        }

        ### OPTIONS для CORS
        location /api/ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type';
                return 204;
            }
        }

        ### SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }


    #############################################################
    # 4) POKERHUB.APP — React DIST + PHP API
    #############################################################
    server {
        listen 443 ssl;
        server_name pokerhub.app;

        ssl_certificate     /etc/letsencrypt/live/pokerhub.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pokerhub.app/privkey.pem;

        ### React SPA
        root /home/fervuld/prod/pokerhub.app/mind-hub-intellect-quest-main/dist;
        index index.html;

        ### API (PHP) - ИСПРАВЛЕНО
        location /api/ {
            root /home/fervuld/prod/pokerhub.app/public_html;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';

            try_files $uri $uri/ /api/index.php?$query_string;
        }

        ### Обработка PHP из API
        location ~ ^/api/.*\.php$ {
            root /home/fervuld/prod/pokerhub.app/public_html;

            include fastcgi_params;
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
        }

        ### SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }


    #############################################################
    # 4) FORM.FIRESTORM.TEAM — PokerHub Forms (FastAPI+React)
    #############################################################
    server {
        listen 443 ssl;
        server_name form.firestorm.team;

        ssl_certificate     /etc/letsencrypt/live/form.firestorm.team/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/form.firestorm.team/privkey.pem;

        # Пробрасываем всё на FastAPI (статик React отдает сам бекенд)
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    #############################################################
    # 4.5) ROISTAT.POKERHUB.PRO — Analytics (React + FastAPI)
    #############################################################
    server {
        listen 443 ssl;
        server_name roistat.pokerhub.pro;

        ssl_certificate     /etc/letsencrypt/live/roistat.pokerhub.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/roistat.pokerhub.pro/privkey.pem;

        location /api/ {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://127.0.0.1:4173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }


    #############################################################
    # 5) REDIRECT HTTP → HTTPS
    #############################################################
    server {
        listen 80;
        server_name telegram.pokerhub.pro webpanel.pokerhub.pro level-iq.ru test.level-iq.ru pokerhub.app form.firestorm.team roistat.pokerhub.pro;
        return 301 https://$host$request_uri;
    }
}
